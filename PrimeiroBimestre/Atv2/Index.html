<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
</head>
<body>

    <form action="#" method="POST">
        
        <fieldset>
            <legend>Crie sua Conta</legend>

            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo">
            </div>
            <br>

            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required placeholder="Não esqueça do @ :)">
            </div>
            <br>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" minlength="8" required placeholder="No minimo 8 caracteres">
            </div>
            <br>

            <div>
                <strong>Gênero</strong><br>
                <input type="radio" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label><br>
                
                <input type="radio" id="feminino" name="genero" value="feminino">
                <label for="feminino">Feminino</label><br>
		
		<input type="radio" id="Outro" name="genero" value="Outro">
                <label for="Outro">Outro</label>
            </div>
            <br>

            <div>
                <label for="biografia">Biografia:</label><br>
                <textarea id="biografia" name="biografia" rows="5" placeholder="Escreva um pouco sobre quem é você..."></textarea>
            </div>
            <br>

            <div>
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Eu li, e concordo com os termos de uso</label>
            </div>
            <br>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </fieldset>
    </form>

</body>
</html>
